<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NHK風 震度分布図メーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #264ed1; }
        .info-panel { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="h-screen flex flex-col text-white">

    <header class="p-4 bg-gray-900 flex justify-between items-center">
        <h1 class="text-lg font-bold">震度分布図メーカー (NHKスタイル)</h1>
        <div class="flex gap-2">
            <button onclick="addEpicenter()" class="bg-red-600 px-3 py-1 rounded">震源を追加(×)</button>
            <button onclick="downloadImage()" class="bg-blue-600 px-3 py-1 rounded">画像を保存</button>
            <button onclick="location.reload()" class="bg-gray-600 px-3 py-1 rounded">リセット</button>
        </div>
    </header>

    <div id="map-container" class="flex-grow relative cursor-crosshair"></div>

    <!-- 左上情報パネル -->
    <div id="info-panel" class="absolute top-20 left-4 w-64 info-panel p-3 border-l-4 border-orange-500 shadow-xl z-50">
        <div class="text-sm">最大震度</div>
        <div class="text-5xl font-bold text-orange-400 my-1" id="max-shindo">4</div>
        <div class="bg-blue-900/80 p-2 text-sm mb-2" id="quake-info">1日 8時40分ごろ M5.1</div>
        <div id="city-list" class="text-xs space-y-0.5 max-h-40 overflow-y-auto"></div>
    </div>

    <script>
        const shindoColors = {
            '1': '#3C5A82', '2': '#1E82E6', '3': '#78E6DC', '4': '#FFFF96',
            '5-': '#FFD200', '5+': '#FF9600', '6-': '#F03200', '6+': '#BE0000', '7': '#8C0028'
        };

        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select("#map-container").append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g");

        const projection = d3.geoMercator().center([138, 36]).scale(2000).translate([width/2, height/2]);
        const path = d3.geoPath().projection(projection);

        // 地図データ読み込み
        d3.json("https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson").then(data => {
            const regions = topojson.feature(data, data.objects.japan);
            g.append("path").datum(regions).attr("d", path).attr("fill", "#a68d79").attr("stroke", "#7a6a5d");
        });

        // 震度アイコン追加
        svg.on("click", (event) => {
            const [x, y] = d3.pointer(event);
            const level = prompt("震度を入力 (1, 2, 3, 4, 5-, 5+, 6-, 6+, 7)", "4");
            if(shindoColors[level]) {
                const group = g.append("g").attr("transform", `translate(${x}, ${y})`);
                group.append("rect").attr("width", 24).attr("height", 24).attr("fill", shindoColors[level]).attr("stroke", "#fff");
                group.append("text").text(level).attr("x", 12).attr("y", 18).attr("text-anchor", "middle").attr("font-weight", "bold");
            }
        });

        function addEpicenter() {
            const [x, y] = [width/2, height/2];
            g.append("text").text("×").attr("x", x).attr("y", y).attr("fill", "red").attr("font-size", 40).attr("font-weight", "bold");
        }

        function downloadImage() {
            const svgData = new XMLSerializer().serializeToString(document.querySelector("svg"));
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#264ed1"; ctx.fillRect(0,0,width,height);
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, 0, 0); const link = document.createElement("a"); link.download = "map.png"; link.href = canvas.toDataURL(); link.click(); };
            img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
        }
    </script>
</body>
</html>
