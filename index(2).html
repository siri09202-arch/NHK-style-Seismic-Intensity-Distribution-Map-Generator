            </div>

                <button id="btn-clear" class="bg-red-700 hover:bg-red-600 transition-colors text-sm px-3 py-1.5 rounded flex items-center gap-1">

        </div>
        
        <!-- 震度選択パレット -->

        <div class="text-xs text-gray-400 mt-[-4px]">

        </div>
    </header>

        // パースしてオブジェクトに格納
        const epicenterData = {};
        epicenterRawList.trim().split('\n').forEach(line => {
            const match = line.match(/(.+?)（(.+?)）\s*\[(\d+)\]/);
            if (match) {
                epicenterData[match[3]] = { 
                    name: match[1], 
                    kana: match[2], 
                    code: match[3], 
                    lon: null, 
                    lat: null, 
                    feature: null 
                };
            }
        });

        // NHK風（カラーユニバーサルデザイン準拠）の震度カラーパレット
        const shindoLevels = [
            { id: '7', label: '7', bg: '#712285', fg: '#FFFFFF' },
            { id: '6+', label: '6強', bg: '#C51A1B', fg: '#FFFFFF' },
            { id: '6-', label: '6弱', bg: '#E60012', fg: '#FFFFFF' },
            { id: '5+', label: '5強', bg: '#F39800', fg: '#000000' },
            { id: '5-', label: '5弱', bg: '#FCC800', fg: '#000000' },
            { id: '4', label: '4', bg: '#FFF799', fg: '#000000' },
            { id: '3', label: '3', bg: '#0068B7', fg: '#FFFFFF' }, 
            { id: '2', label: '2', bg: '#00A0E9', fg: '#000000' },
            { id: '1', label: '1', bg: '#FFFFFF', fg: '#000000' }
        ];

        let currentSelectedLevel = '7'; // 初期選択の震度
        let icons = []; // 配置された震度アイコンのデータ配列
        let currentTransform = d3.zoomIdentity; // 現在のズーム/パン状態

        // --------------------------------------------------
        // UIの初期化（震度選択ボタンの生成）
        // --------------------------------------------------
        const selector = document.getElementById('shindo-selector');
        
        function updateSelectorUI() {
            Array.from(selector.querySelectorAll('button')).forEach(btn => {
                if (btn.dataset.id === currentSelectedLevel) {
                    btn.className = 'flex-shrink-0 w-11 h-11 rounded border-2 border-white ring-2 ring-blue-400 font-bold text-sm shadow-md transition-transform scale-110 z-10 cursor-pointer';
                } else {
                    btn.className = 'flex-shrink-0 w-11 h-11 rounded border border-gray-600 font-bold text-sm shadow-sm transition-transform hover:scale-105 opacity-80 hover:opacity-100 cursor-pointer';
                }
            });
        }

        shindoLevels.forEach(level => {
            const btn = document.createElement('button');
            btn.dataset.id = level.id;
            btn.style.backgroundColor = level.bg;
            btn.style.color = level.fg;
            btn.innerText = level.label;
            if(level.label.length > 1) {
                btn.style.fontSize = '0.75rem';
                btn.style.lineHeight = '1';
                btn.style.letterSpacing = '-1px';
            }
            btn.onclick = () => {
                currentSelectedLevel = level.id;
                updateSelectorUI();
            };
            selector.appendChild(btn);
        });
        updateSelectorUI();

        // セレクトボックスへの地域一覧の流し込み
        const regionSelect = document.getElementById('region-select');
        Object.values(epicenterData).forEach(ep => {
            const option = document.createElement('option');
            option.value = ep.code;
            option.textContent = `${ep.name} [${ep.code}]`;
            regionSelect.appendChild(option);
        });

        // --------------------------------------------------
        // 地図のセットアップ (D3.js)
        // --------------------------------------------------
        const container = document.getElementById('map-container');
        let width = container.clientWidth;
        let height = container.clientHeight;

        const svg = d3.select('#map-container').append('svg')
            .attr('id', 'map-svg')
            .attr('width', width)
            .attr('height', height)
            .style('background-color', '#1e3b5a')
            .style('display', 'block');

        const mapLayer = svg.append('g').attr('id', 'map-layer');
        const iconLayer = svg.append('g').attr('id', 'icon-layer');
        const legendLayer = svg.append('g').attr('id', 'legend-layer');

        const projection = d3.geoMercator()
            .center([137.5, 38.0])
            .scale(width > 800 ? 2000 : 1200)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const zoom = d3.zoom()
            .scaleExtent([0.5, 30])
            .on('zoom', (event) => {
                currentTransform = event.transform;
                mapLayer.attr('transform', event.transform);
                updateIconPositions();
            });

        svg.call(zoom);

        // --------------------------------------------------
        // 地図データと気象庁 GeoJSON の読み込み
        // --------------------------------------------------
        const topoJsonUrl = 'https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson';
        const jmaEqGeoJsonUrl = 'https://www.jma.go.jp/bosai/common/const/geojson/earthquake.json';

        // 2つのデータを並行して読み込む（JMAデータはエラー時にnullを返すことで停止を防ぐ）
        Promise.all([
            d3.json(topoJsonUrl),
            d3.json(jmaEqGeoJsonUrl).catch(err => {
                console.warn("気象庁の細分区域GeoJSONが読み込めませんでした。クリック時の自動中央配置は近似値になります。", err);
                return null;
            })
        ]).then(([topoData, eqGeoJson]) => {
            document.getElementById('loading').style.display = 'none';

            // ① 地形データの描画
            const geojson = topojson.feature(topoData, topoData.objects.japan);
            mapLayer.selectAll('path')
                .data(geojson.features)
                .enter()
                .append('path')
                .attr('d', path)
                .attr('fill', '#8c7961')
                .attr('stroke', '#5c4d3c')
                .attr('stroke-width', 0.5)
                .attr('vector-effect', 'non-scaling-stroke');

            // ② 気象庁の震央地名（細分区域）データの処理
            if (eqGeoJson && eqGeoJson.features) {
                eqGeoJson.features.forEach(feature => {
                    const props = feature.properties;
                    // JMAのGeoJSONでは大抵 code が入っている
                    let code = props.code || props.id || props.regioncode;
                    
                    // codeがない場合は名前で逆引き
                    if (!code) {
                        const matched = Object.values(epicenterData).find(e => e.name === props.name);
                        if (matched) code = matched.code;
                    }

                    if (code && epicenterData[code]) {
                        epicenterData[code].feature = feature;
                        // d3.geoCentroid でポリゴンの地理的な重心を計算
                        const centroid = d3.geoCentroid(feature);
                        epicenterData[code].lon = centroid[0];
                        epicenterData[code].lat = centroid[1];
                    }
                });
            }

            // 初期サンプルのアイコンを配置（能登半島 [390] の中央）
            const defaultCode = '390';
            if (epicenterData[defaultCode] && epicenterData[defaultCode].lon) {
                icons.push({ 
                    id: Date.now(), 
                    code: defaultCode,
                    lon: epicenterData[defaultCode].lon, 
                    lat: epicenterData[defaultCode].lat, 
                    level: '7',
                    name: epicenterData[defaultCode].name
                });
            } else {
                // JMAデータが無かった場合のフォールバック座標
                icons.push({ id: Date.now(), code: null, lon: 136.9, lat: 37.4, level: '7' });
            }
            
            renderIcons();
            drawLegend();
        }).catch(err => {
            console.error("地図データの読み込みに致命的なエラーが発生しました:", err);
            document.getElementById('loading').innerHTML = '<span class="text-red-400">地図データの読み込みに失敗しました。</span>';
        });

        // --------------------------------------------------
        // インタラクションと描画ロジック
        // --------------------------------------------------

        // マップクリックでアイコン追加（自動的に地域の中央にスナップ）
        svg.on('click', (event) => {
            if (event.defaultPrevented) return; 

            const [x, y] = d3.pointer(event);
            const invertedPoint = currentTransform.invert([x, y]);
            const [lon, lat] = projection.invert(invertedPoint);
            
            let targetCode = null;
            let minDistance = Infinity;

            // クリック地点がどの震央地名に含まれるか判定
            for (const code in epicenterData) {
                const ep = epicenterData[code];
                if (!ep.feature || !ep.lon || !ep.lat) continue;
                
                // 完全に領域内に含まれる場合
                if (d3.geoContains(ep.feature, [lon, lat])) {
                    targetCode = code;
                    break;
                }
                
                // 海上など領域外をクリックした時のため、最も重心が近い地域を記憶
                const dist = d3.geoDistance([lon, lat], [ep.lon, ep.lat]);
                if (dist < minDistance) {
                    minDistance = dist;
                    targetCode = code;
                }
            }

            if (targetCode && epicenterData[targetCode].lon) {
                const ep = epicenterData[targetCode];
                // 1地域につき1つの震度情報のみ表示するため、同じ地域のアイコンは上書き
                icons = icons.filter(icon => icon.code !== targetCode);
                
                icons.push({ 
                    id: Date.now(), 
                    code: targetCode,
                    lon: ep.lon, 
                    lat: ep.lat, 
                    level: currentSelectedLevel,
                    name: ep.name
                });
                
                // セレクトボックスの表示も同期させる
                regionSelect.value = targetCode;
            } else {
                // GeoJSONがロードできなかった場合のフォールバック（クリック位置そのまま）
                icons.push({ id: Date.now(), code: null, lon, lat, level: currentSelectedLevel, name: "不明" });
            }
            
            renderIcons();
        });

        // 「配置」ボタン（セレクトボックスから指定）のロジック
        document.getElementById('btn-add-region').addEventListener('click', () => {
            const code = regionSelect.value;
            if (!code) {
                alert("地域を選択してください。");
                return;
            }

            const ep = epicenterData[code];
            if (ep && ep.lon && ep.lat) {
                // 重複上書き
                icons = icons.filter(icon => icon.code !== code);
                icons.push({
                    id: Date.now(),
                    code: code,
                    lon: ep.lon,
                    lat: ep.lat,
                    level: currentSelectedLevel,
                    name: ep.name
                });
                renderIcons();
            } else {
                alert("該当地域の座標データが取得できていないため、配置できません。");
            }
        });


        // アイコンの描画と更新
        function renderIcons() {
            const iconGroups = iconLayer.selectAll('g.shindo-icon')
                .data(icons, d => d.id);

            const enter = iconGroups.enter()
                .append('g')
                .attr('class', 'shindo-icon')
                .style('cursor', 'pointer')
                .on('click', (event, d) => {
                    event.stopPropagation();
                    icons = icons.filter(icon => icon.id !== d.id);
                    renderIcons();
                });

            // ツールチップ（ホバー時の地名表示）
            enter.append('title')
                .text(d => d.name ? `${d.name} (震度${d.level})` : `震度${d.level}`);

            enter.append('rect')
                .attr('x', -14)
                .attr('y', -14)
                .attr('width', 28)
                .attr('height', 28)
                .attr('rx', 4)
                .attr('ry', 4)
                .attr('stroke', '#222')
                .attr('stroke-width', 1.5)
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.bg : '#FFF';
                });

            enter.append('text')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('font-family', '"Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif')
                .attr('font-weight', '900')
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.fg : '#000';
                })
                .attr('font-size', d => {
                    const label = shindoLevels.find(l => l.id === d.level)?.label || '';
                    return label.length > 1 ? '11px' : '18px';
                })
                .attr('letter-spacing', d => {
                    const label = shindoLevels.find(l => l.id === d.level)?.label || '';
                    return label.length > 1 ? '-1px' : '0px';
                })
                .attr('dy', '0.05em') 
                .text(d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.label : '';
                });

            iconGroups.exit().remove();
            updateIconPositions();
        }

        function updateIconPositions() {
            iconLayer.selectAll('g.shindo-icon')
                .attr('transform', d => {
                    const projected = projection([d.lon, d.lat]);
                    if (!projected) return `translate(-1000, -1000)`;
                    const [x, y] = projected;
                    const tx = currentTransform.applyX(x);
                    const ty = currentTransform.applyY(y);
                    return `translate(${tx}, ${ty})`;
                });
        }

        function drawLegend() {
            legendLayer.selectAll('*').remove();
            
            const legendWidth = 60;
            const itemHeight = 28;
            const padding = 10;
            const legendHeight = (shindoLevels.length * itemHeight) + (padding * 2);
            
            const startX = width - legendWidth - 20;
            const startY = height - legendHeight - 20;
            
            legendLayer.attr('transform', `translate(${startX}, ${startY})`);

            legendLayer.append('rect')
                .attr('width', legendWidth)
                .attr('height', legendHeight)
                .attr('fill', 'rgba(15, 30, 50, 0.7)')
                .attr('rx', 6)
                .attr('stroke', 'rgba(255,255,255,0.2)')
                .attr('stroke-width', 1);

            legendLayer.append('text')
                .attr('x', legendWidth / 2)
                .attr('y', 16)
                .attr('text-anchor', 'middle')
                .attr('fill', '#fff')
                .attr('font-size', '10px')
                .attr('font-weight', 'bold')
                .attr('font-family', 'sans-serif')
                .text('震度');

            shindoLevels.forEach((level, i) => {
                const g = legendLayer.append('g')
                    .attr('transform', `translate(${legendWidth / 2}, ${padding + 16 + i * itemHeight + itemHeight / 2})`);
                
                g.append('rect')
                    .attr('x', -12)
                    .attr('y', -12)
                    .attr('width', 24)
                    .attr('height', 24)
                    .attr('rx', 3)
                    .attr('fill', level.bg)
                    .attr('stroke', '#222')
                    .attr('stroke-width', 1);
                    
                g.append('text')
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'central')
                    .attr('font-size', level.label.length > 1 ? '10px' : '15px')
                    .attr('font-weight', 'bold')
                    .attr('font-family', 'sans-serif')
                    .attr('letter-spacing', level.label.length > 1 ? '-1px' : '0px')
                    .attr('dy', '0.05em') 
                    .attr('fill', level.fg)
                    .text(level.label);
            });
        }

        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            
            svg.attr('width', width).attr('height', height);
            
            projection.translate([width / 2, height / 2]);
            mapLayer.selectAll('path').attr('d', path);
            
            updateIconPositions();
            drawLegend();
        });

        document.getElementById('btn-reset-zoom').addEventListener('click', () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            icons = [];
            renderIcons();
            regionSelect.value = "";
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            const svgElement = document.getElementById('map-svg');
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgElement);
            
            if (!svgString.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                svgString = svgString.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = () => {
                ctx.fillStyle = '#1e3b5a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = `shindo_map_${new Date().getTime()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });

    </script>
</body>
</html>
